name: 'Strands Coder'
description: 'Run Strands Agents in GitHub Actions'
author: 'Strands Agents'

branding:
  icon: 'bot'
  color: 'blue'

inputs:
  prompt:
    description: 'Task for the AI agent to perform'
    required: true
  
  provider:
    description: 'AI provider (bedrock, github, openai, anthropic). If empty, uses STRANDS_PROVIDER env var or bedrock default.'
    required: false
    default: ''
  
  model:
    description: 'Model ID. If empty, uses STRANDS_MODEL_ID env var or provider default.'
    required: false
    default: ''
  
  tools:
    description: 'Tool config string (e.g., strands_tools:shell,file_read;strands_action:gist)'
    required: false
    default: ''
  
  system_prompt:
    description: 'System prompt'
    required: false
    default: ''
  
  max_tokens:
    description: 'Maximum tokens for model response. If empty, uses STRANDS_MAX_TOKENS env var or provider default.'
    required: false
    default: ''
  
  mcp_servers:
    description: 'MCP servers config JSON (e.g., {"mcpServers": {...}})'
    required: false
    default: ''
  
  agent_runner:
    description: 'Custom agent runner URL (falls back to AGENT_RUNNER variable)'
    required: false
    default: ''
  
  dependencies:
    description: 'Custom pip dependencies (space-separated)'
    required: false
    default: ''
  
  git_user_name:
    description: 'Git user name for commits'
    required: false
    default: ''
  
  git_user_email:
    description: 'Git user email for commits'
    required: false
    default: ''
  
  skip_git_config:
    description: 'Skip git configuration (set to "true" to skip)'
    required: false
    default: 'false'
  
  additional_request_fields:
    description: 'Additional request fields JSON (e.g., {"thinking": {"type": "enabled"}})'
    required: false
    default: ''
  
  aws_role_arn:
    description: 'AWS role ARN for OIDC authentication (required for bedrock provider)'
    required: false
    default: ''
  
  aws_region:
    description: 'AWS region for Bedrock'
    required: false
    default: 'us-west-2'


runs:
  using: 'composite'
  steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Configure Git
      if: inputs.skip_git_config != 'true'
      shell: bash
      run: |
        git config --global user.name "${{ inputs.git_user_name }}"
        git config --global user.email "${{ inputs.git_user_email }}"

    - name: Configure AWS (Bedrock only)
      if: (inputs.provider == 'bedrock' || inputs.provider == '') && inputs.aws_role_arn != ''
      uses: aws-actions/configure-aws-credentials@v5
      with:
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region }}
        mask-aws-account-id: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Setup Python & uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        SETUPTOOLS_SCM_PRETEND_VERSION: "0.1.0"
      run: |
        uv venv
        echo "📦 Installing strands-action"
        uv pip install .
        if [ -n "${{ inputs.dependencies }}" ]; then
          echo "📦 Installing custom dependencies: ${{ inputs.dependencies }}"
          uv pip install ${{ inputs.dependencies }}
        fi

    - name: Download Custom Agent Runner
      if: inputs.agent_runner != ''
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        echo "📥 Downloading custom agent runner from ${{ inputs.agent_runner }}"
        curl -fsSL "${{ inputs.agent_runner }}" -o custom_agent_runner.py
        echo "✅ Custom agent runner downloaded"

    - name: Agent
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        GITHUB_CONTEXT: ${{ toJson(github) }}
        # Model config inputs stored as _INPUT vars — only applied if non-empty (see run script)
        _PROVIDER_INPUT: ${{ inputs.provider }}
        _MODEL_INPUT: ${{ inputs.model }}
        _MAX_TOKENS_INPUT: ${{ inputs.max_tokens }}
        STRANDS_ADDITIONAL_REQUEST_FIELDS: ${{ inputs.additional_request_fields || env.STRANDS_ADDITIONAL_REQUEST_FIELDS }}
        STRANDS_TOOLS: ${{ inputs.tools || env.STRANDS_TOOLS }}
        SYSTEM_PROMPT: ${{ inputs.system_prompt }}
        MCP_SERVERS: ${{ inputs.mcp_servers || env.MCP_SERVERS }}
        STRANDS_PROMPT: ${{ inputs.prompt }}
        PYTHONPATH: ${{ github.action_path }}
        VIRTUAL_ENV: ${{ github.action_path }}/.venv
      run: |
        # Only override model config env vars if explicitly provided via inputs.
        # This allows the calling workflow's env block (from vars.*) to be the source of truth.
        # If neither input nor env var is set, create_model() uses sensible per-provider defaults.
        [ -n "$_PROVIDER_INPUT" ] && export STRANDS_PROVIDER="$_PROVIDER_INPUT"
        [ -n "$_MODEL_INPUT" ] && export STRANDS_MODEL_ID="$_MODEL_INPUT"
        [ -n "$_MAX_TOKENS_INPUT" ] && export STRANDS_MAX_TOKENS="$_MAX_TOKENS_INPUT"

        echo "🔧 Model config: STRANDS_PROVIDER=${STRANDS_PROVIDER:-<env/default>} STRANDS_MODEL_ID=${STRANDS_MODEL_ID:-<env/default>} STRANDS_MAX_TOKENS=${STRANDS_MAX_TOKENS:-<env/default>}"

        if [ -f "${{ github.action_path }}/custom_agent_runner.py" ]; then
          "${{ github.action_path }}/.venv/bin/python" "${{ github.action_path }}/custom_agent_runner.py"
        else
          "${{ github.action_path }}/.venv/bin/python" "${{ github.action_path }}/strands_coder/agent_runner.py"
        fi
